<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Expense Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">💰 Expense Tracker</div>

            <nav class="nav-menu">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link">
                        <span>📊</span> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="transactions.html" class="nav-link active">
                        <span>💳</span> Transactions
                    </a>
                </li>
                <li class="nav-item">
                    <a href="categories.html" class="nav-link">
                        <span>🏷️</span> Categories
                    </a>
                </li>
                <li class="nav-item">
                    <a href="budgets.html" class="nav-link">
                        <span>💰</span> Budgets
                    </a>
                </li>
                <li class="nav-item">
                    <a href="reports.html" class="nav-link">
                        <span>📈</span> Reports
                    </a>
                </li>
                <li class="nav-item">
                    <a href="profile.html" class="nav-link">
                        <span>👤</span> Profile
                    </a>
                </li>
            </nav>

            <div class="user-section">
                <div class="user-info">
                    <div class="user-email" id="userEmail">-</div>
                    <button class="btn btn-sm btn-outline" id="logoutBtn">Logout</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <div class="header-title">
                    <h1>Transactions</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" id="addTransactionBtn">+ New Transaction</button>
                    <button class="btn btn-icon" id="darkModeToggle" title="Toggle dark mode">🌙</button>
                </div>
            </div>

            <!-- Filters -->
            <div class="card" style="margin-bottom: 2rem;">
                <div class="card-header">
                    <h3 class="card-title">Filters</h3>
                </div>
                <div class="card-body">
                    <div class="grid grid-4" style="gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">Start Date</label>
                            <input type="date" id="filterStartDate" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">End Date</label>
                            <input type="date" id="filterEndDate" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select id="filterCategory" class="form-select">
                                <option value="">All Categories</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Type</label>
                            <select id="filterType" class="form-select">
                                <option value="">All Types</option>
                                <option value="income">Income</option>
                                <option value="expense">Expense</option>
                            </select>
                        </div>
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button class="btn btn-primary" id="applyFiltersBtn">Apply Filters</button>
                        <button class="btn btn-outline" id="resetFiltersBtn">Reset</button>
                        <button class="btn btn-secondary" id="exportBtn">📥 Export</button>
                    </div>
                </div>
            </div>

            <!-- Transactions Table -->
            <div class="card">
                <div id="transactionsContainer">
                    <div class="loading"><span class="spinner"></span> Loading transactions...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Transaction Modal -->
    <div class="modal" id="transactionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">New Transaction</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="transactionForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Amount</label>
                        <input type="number" id="amount" class="form-input" placeholder="0.00" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Type</label>
                        <select id="type" class="form-select" required>
                            <option value="">Select type</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select id="categoryId" class="form-select" required>
                            <option value="">Select category</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" id="date" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Payment Method</label>
                        <select id="paymentMethod" class="form-select">
                            <option value="">Select method</option>
                            <option value="cash">Cash</option>
                            <option value="credit_card">Credit Card</option>
                            <option value="debit_card">Debit Card</option>
                            <option value="bank_transfer">Bank Transfer</option>
                            <option value="digital_wallet">Digital Wallet</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Notes</label>
                        <textarea id="notes" class="form-textarea" placeholder="Optional notes..."></textarea>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" id="modalCancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Add Transaction</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/transactions.js"></script>
</body>
</html>
