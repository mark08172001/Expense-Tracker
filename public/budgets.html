<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgets - Expense Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">💰 Expense Tracker</div>

            <nav class="nav-menu">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link">
                        <span>📊</span> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="transactions.html" class="nav-link">
                        <span>💳</span> Transactions
                    </a>
                </li>
                <li class="nav-item">
                    <a href="categories.html" class="nav-link">
                        <span>🏷️</span> Categories
                    </a>
                </li>
                <li class="nav-item">
                    <a href="budgets.html" class="nav-link active">
                        <span>💰</span> Budgets
                    </a>
                </li>
                <li class="nav-item">
                    <a href="reports.html" class="nav-link">
                        <span>📈</span> Reports
                    </a>
                </li>
                <li class="nav-item">
                    <a href="profile.html" class="nav-link">
                        <span>👤</span> Profile
                    </a>
                </li>
            </nav>

            <div class="user-section">
                <div class="user-info">
                    <div class="user-email" id="userEmail">-</div>
                    <button class="btn btn-sm btn-outline" id="logoutBtn">Logout</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <div class="header-title">
                    <h1>Budget Management</h1>
                </div>
                <div class="header-actions">
                    <input type="month" id="monthSelector" class="form-input" style="max-width: 150px;">
                    <button class="btn btn-primary" id="addBudgetBtn">+ New Budget</button>
                    <button class="btn btn-icon" id="darkModeToggle" title="Toggle dark mode">🌙</button>
                </div>
            </div>

            <!-- Budgets Grid -->
            <div class="grid grid-2" id="budgetsContainer">
                <div class="loading" style="grid-column: 1 / -1;"><span class="spinner"></span> Loading budgets...</div>
            </div>
        </main>
    </div>

    <!-- Budget Modal -->
    <div class="modal" id="budgetModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">New Budget</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="budgetForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select id="budgetCategoryId" class="form-select" required>
                            <option value="">Select category</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Monthly Limit</label>
                        <input type="number" id="budgetMonthlyLimit" class="form-input" placeholder="0.00" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Month</label>
                        <input type="month" id="budgetMonth" class="form-input" required>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" id="modalCancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Create Budget</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/budgets.js"></script>
</body>
</html>
