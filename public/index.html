<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Login/Register</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
        }

        .auth-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 3rem 2rem;
        }

        .auth-logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: #6366f1;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #e5e7eb;
            margin-bottom: 2rem;
            gap: 0;
        }

        .auth-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            color: #6b7280;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
        }

        .auth-form {
            display: none;
        }

        .auth-form.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .auth-button {
            width: 100%;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">💰</div>
            <div class="auth-subtitle">Expense Tracker - Manage Your Finances</div>

            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="register">Register</div>
            </div>

            <!-- Login Form -->
            <form class="auth-form show" id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="loginEmail" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="loginPassword" required>
                </div>

                <button type="submit" class="btn btn-primary auth-button" id="loginBtn">
                    <span>Login</span>
                </button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" id="registerName" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="registerEmail" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="registerPassword" placeholder="Minimum 8 characters" required>
                </div>

                <button type="submit" class="btn btn-primary auth-button" id="registerBtn">
                    <span>Register</span>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import Auth from './js/auth.js';
        import Utils from './js/utils.js';

        // Initialize
        Utils.loadDarkModePreference();

        // Check if already logged in
        (async () => {
            const isAuth = await Auth.init();
            if (isAuth) {
                window.location.href = 'dashboard.html';
            }
        })();

        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;

                // Update active tab
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Update form visibility
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('show'));
                document.getElementById(tabName + 'Form').classList.add('show');
            });
        });

        // Login handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;

            try {
                btn.innerHTML = '<span class="spinner"></span>';
                btn.disabled = true;

                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;

                await Auth.login(email, password);
                Utils.showToast('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } catch (error) {
                // Error already shown by Auth module
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Register handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const originalText = btn.innerHTML;

            try {
                btn.innerHTML = '<span class="spinner"></span>';
                btn.disabled = true;

                const name = document.getElementById('registerName').value;
                const email = document.getElementById('registerEmail').value;
                const password = document.getElementById('registerPassword').value;

                if (password.length < 8) {
                    Utils.showToast('Password must be at least 8 characters', 'error');
                    return;
                }

                await Auth.register(email, password, name);
                Utils.showToast('Registration successful! Logging in...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } catch (error) {
                // Error already shown by Auth module
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
