<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Expense Tracker</title>
    <link rel="stylesheet" href="/src/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">💰 Expense Tracker</div>
            <nav class="nav-menu">
                <li class="nav-item"><a href="/dashboard.html" class="nav-link"><span>📊</span> Dashboard</a></li>
                <li class="nav-item"><a href="/transactions.html" class="nav-link"><span>💳</span> Transactions</a></li>
                <li class="nav-item"><a href="/categories.html" class="nav-link"><span>🏷️</span> Categories</a></li>
                <li class="nav-item"><a href="/budgets.html" class="nav-link"><span>💰</span> Budgets</a></li>
                <li class="nav-item"><a href="/reports.html" class="nav-link active"><span>📈</span> Reports</a></li>
                <li class="nav-item"><a href="/profile.html" class="nav-link"><span>👤</span> Profile</a></li>
            </nav>
            <div class="user-section">
                <div class="user-info">
                    <div class="user-email" id="userEmail">-</div>
                    <button class="btn btn-sm btn-outline" id="logoutBtn">Logout</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <div class="header-title"><h1>Financial Reports</h1></div>
                <div class="header-actions">
                    <button class="btn btn-icon" id="darkModeToggle" title="Toggle dark mode">🌙</button>
                </div>
            </div>

            <div class="card" style="margin-bottom: 2rem;">
                <div class="card-header">
                    <h2 class="card-title">Monthly Analysis</h2>
                    <input type="month" id="monthSelector" class="form-input" style="max-width: 150px;">
                </div>
                <div class="chart-container">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>

            <div class="grid grid-2" style="margin-bottom: 2rem; gap: 1.5rem;">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Yearly Comparison</h2>
                    </div>
                    <div class="chart-container">
                        <canvas id="yearlyChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Year Summary</h2>
                    </div>
                    <div id="yearlySummary">
                        <div class="loading"><span class="spinner"></span> Loading...</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Category Spending Trends</h2>
                    <select id="categorySelector" class="form-select" style="max-width: 200px;"></select>
                </div>
                <div class="chart-container">
                    <canvas id="categoryTrendChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/src/pages/reports.js"></script>
</body>
</html>
